<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Accessible freight load discovery and dispatch workspace" />
    <script>
      (() => {
        const stored = localStorage.getItem('freight-theme') || 'system';
        const dark = stored === 'dark' || (stored === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
      })();
    </script>
    <title>Freightboard</title>
  </head>
  <body>
    <nav class="skip-links" aria-label="Skip links">
      <a class="skip-link" href="#main-content">Skip to load board</a>
      <a class="skip-link" href="#load-pagination">Skip to pagination</a>
    </nav>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
